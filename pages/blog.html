<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; color: #111; font-family: 'Geist', sans-serif; font-size: 15px; line-height: 1.75; }
    .page { max-width: 600px; margin: 0 auto; padding: 4rem 1.5rem 6rem; }
    .back { display: inline-block; font-size: 0.8rem; color: #aaa; text-decoration: none; margin-bottom: 2.5rem; }
    .back:hover { color: #555; }
    h1 { font-size: 1.15rem; font-weight: 500; margin-bottom: 2rem; }

    .year-group { margin-bottom: 2rem; }
    .year {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 0.5rem;
    }

    .post {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1.5rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid #f5f5f5;
      text-decoration: none;
    }
    .post:first-of-type { border-top: 1px solid #f5f5f5; }
    .post-title { font-size: 0.88rem; color: #222; }
    .post-date  { font-size: 0.77rem; color: #bbb; white-space: nowrap; flex-shrink: 0; }
    .post:hover .post-title { color: #000; }

    .empty { font-size: 0.88rem; color: #bbb; padding: 1rem 0; }

    .hint {
      margin-top: 3rem;
      padding: 1rem 1.25rem;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 8px;
      font-size: 0.8rem;
      color: #aaa;
      line-height: 1.6;
    }
    .hint code {
      font-family: monospace;
      font-size: 0.82em;
      background: #f0f0f0;
      padding: 0.1em 0.3em;
      border-radius: 3px;
      color: #555;
    }
  </style>
</head>
<body>
<div class="page">

  <a class="back" href="../index.html">← back</a>

  <h1>Blog</h1>

  <div class="year-group">
    <p class="year">2026</p>
    <a class="post" href="../blog/the art of starting over.html">
      <span class="post-title">The Art of Starting Over</span>
      <span class="post-date">May 31</span>
    </a>

  </div>
</div>
</body>
</html>
