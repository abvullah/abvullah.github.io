<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; color: #111; font-family: 'Geist', sans-serif; font-size: 15px; line-height: 1.75; }
    .page { max-width: 600px; margin: 0 auto; padding: 4rem 1.5rem 6rem; }
    .back { display: inline-block; font-size: 0.8rem; color: #aaa; text-decoration: none; margin-bottom: 2.5rem; }
    .back:hover { color: #555; }
    h1 { font-size: 1.15rem; font-weight: 500; margin-bottom: 0.5rem; }
    .sub { font-size: 0.875rem; color: #888; margin-bottom: 2.5rem; }
    hr { border: none; border-top: 1px solid #eee; margin: 2rem 0; }

    .contact-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .contact-row:first-of-type { border-top: 1px solid #f5f5f5; }
    .contact-label { font-size: 0.82rem; color: #888; }
    .contact-row a {
      font-size: 0.85rem;
      color: #222;
      text-decoration: none;
    }
    .contact-row a:hover { color: #000; text-decoration: underline; text-underline-offset: 3px; }
  </style>
</head>
<body>
<div class="page">

  <a class="back" href="../index.html">← back</a>

  <h1>Contact</h1>
  <p class="sub">Best way to reach me is via Linkedin. I'd respond as soon as I can.</p>

  <div class="contact-row">
    <span class="contact-label">Email</span>
    <a href="mailto:abd140e@gmail.com">abd140e@gmail.com</a>
  </div>
  <div class="contact-row">
    <span class="contact-label">GitHub</span>
    <a href="https://github.com/abvullah" target="_blank">github.com/abvullah</a>
  </div>
  <div class="contact-row">
    <span class="contact-label">LinkedIn</span>
    <a href="https://linkedin.com/in/amhmd" target="_blank">linkedin.com/in/amhmd</a>
  </div>

</div>
</body>
</html>
