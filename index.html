<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>abdullah mohammad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff;
      color: #111;
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }
    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 5rem 1.5rem 6rem;
    }
    .card {
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 2rem;
      text-align: center;
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 1.25rem;
      background: #f0f0f0;
      border: 1px solid #e5e5e5;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .avatar-initials {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: #999;
    }
    h1 { font-size: 1.2rem; font-weight: 500; margin-bottom: 0.25rem; }
    .sub { font-size: 0.85rem; color: #888; margin-bottom: 1.75rem; }
    .nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }
    .nav a {
      display: block;
      font-size: 0.82rem;
      color: #333;
      text-decoration: none;
      padding: 0.55rem 0;
      border: 1px solid #e5e5e5;
      border-radius: 7px;
      transition: border-color 0.15s, color 0.15s;
    }
    .nav a:hover { border-color: #bbb; color: #000; }
    .footer { text-align: center; font-size: 0.72rem; color: #ccc; margin-top: 2rem; }
  </style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="avatar">
      <img src="assets/photo.jpg" alt="abdullah mohammad"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
      <div class="avatar-initials" style="display:none;">AM</div>
    </div>
    <h1>abdullah mohammad</h1>
    <p class="sub">idk what to put here.</p>
    <nav class="nav">
      <a href="pages/about.html">About</a>
      <a href="pages/essays.html">Essays</a>
      <a href="pages/contact.html">Contact</a>
      <a href="pages/resume.html">Resume</a>
    </nav>
  </div>
  <div class="footer">© <span id="yr"></span> abdullah mohammad</div>
</div>
<script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
</body>
</html>
